name: rescuenet-env
description: Disaster response resource allocation RL environment

observation_space:
  type: object
  properties:
    regions:
      type: array
    available_resources:
      type: array
    time_step:
      type: integer

action_space:
  type: object
  properties:
    region_id:
      type: integer
    resource_type:
      type: string
      enum:
        - food
        - medical
        - rescue
    quantity:
      type: float

tasks:
  - name: easy_1
    entry_point: tasks:easy_1
    grader: grader:grade_environment

  - name: medium_1
    entry_point: tasks:medium_1
    grader: grader:grade_environment

  - name: hard_1
    entry_point: tasks:hard_1
    grader: grader:grade_environment

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state